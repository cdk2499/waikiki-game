<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WAIKIKI</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#061820;touch-action:none;user-select:none;}
canvas{position:fixed;inset:0;width:100%;height:100%;}
#ui{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:10;}
.eye{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:9px;color:#f59e42;opacity:.85;}
.title{font-family:'Bebas Neue',sans-serif;font-size:clamp(72px,18vw,108px);line-height:.88;color:#fff;letter-spacing:3px;text-align:center;
       text-shadow:0 0 60px rgba(45,212,160,.2),0 4px 40px rgba(0,0,0,.4);}
.sub{font-family:Georgia,serif;font-style:italic;font-size:17px;color:rgba(255,255,255,.45);margin-bottom:8px;}
.modes{display:flex;flex-direction:column;gap:12px;width:260px;margin-top:8px;}
.mode-btn{
  display:block;text-decoration:none;
  font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:4px;
  color:#fff;background:transparent;
  border:1.5px solid rgba(255,255,255,.28);
  padding:16px 24px;text-align:center;
  transition:border-color .2s,background .2s,color .2s;
}
.mode-btn:active,.mode-btn:hover{background:rgba(255,255,255,.06);border-color:#2dd4a0;color:#2dd4a0;}
.mode-label{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.35);display:block;margin-top:3px;font-family:Georgia,serif;font-style:italic;}
.mode-btn.obs{border-color:rgba(255,107,74,.4);}
.mode-btn.obs:active,.mode-btn.obs:hover{border-color:#ff6b4a;color:#ff6b4a;background:rgba(255,107,74,.06);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="eye">Honolulu · Oʻahu</div>
  <div class="title">WAIKIKI</div>
  <div class="sub">choose your wave</div>
  <div class="modes">
    <a class="mode-btn" href="index.html">
      CLASSIC MODE
      <span class="mode-label">ride the barrel · 7 waves</span>
    </a>
    <a class="mode-btn obs" href="obstacles.html">
      OBSTACLE MODE
      <span class="mode-label">dodge kooks · turtles · sharks</span>
    </a>
  </div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const W=()=>canvas.width,H=()=>canvas.height;
let t=0;
function loop(){
  t++;
  const w=W(),h=H();
  ctx.clearRect(0,0,w,h);
  // Sky
  const sky=ctx.createLinearGradient(0,0,0,h*.55);
  sky.addColorStop(0,'#0c1e36');sky.addColorStop(.6,'#1e4a68');sky.addColorStop(1,'#c07030');
  ctx.fillStyle=sky;ctx.fillRect(0,0,w,h*.55);
  // Sun glow
  const sx=w*.72,sy=h*.18;
  const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,h*.22);
  sg.addColorStop(0,'rgba(255,215,80,.25)');sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sg;ctx.fillRect(0,0,w,h*.55);
  ctx.save();ctx.beginPath();ctx.arc(sx,sy,h*.03,0,Math.PI*2);
  ctx.fillStyle='#ffe07a';ctx.shadowColor='#ffcc44';ctx.shadowBlur=22;ctx.fill();ctx.restore();
  // Diamond Head
  ctx.save();ctx.globalAlpha=.48;ctx.fillStyle='#0a1b28';
  ctx.beginPath();ctx.moveTo(0,h*.54);ctx.lineTo(w*.1,h*.37);ctx.lineTo(w*.25,h*.30);
  ctx.lineTo(w*.36,h*.33);ctx.lineTo(w*.5,h*.53);ctx.fill();ctx.restore();
  // Ocean
  const og=ctx.createLinearGradient(0,h*.53,0,h);
  og.addColorStop(0,'#0d3850');og.addColorStop(1,'#051620');
  ctx.fillStyle=og;ctx.fillRect(0,h*.53,w,h);
  // Shimmer lines
  ctx.save();ctx.globalAlpha=.04;ctx.strokeStyle='#fff';ctx.lineWidth=1;
  for(let i=0;i<5;i++){
    const ly=h*.55+i*10+Math.sin(t*.018+i)*3;
    ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(w,ly);ctx.stroke();
  }
  ctx.restore();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
